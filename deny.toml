# cargo-deny configuration per D0018 §8.4 + D0019 license allowlist.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []
# vulnerability = "deny" and notice = "warn" are now the cargo-deny defaults
# (since v0.14; explicit settings would emit deprecation warnings)

[licenses]
# Per D0019 license allowlist.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "AGPL-3.0-only",
    # Apache-2.0 WITH LLVM-exception is permissive enough to allow
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"  # tighten to "deny" after initial cleanup
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
