# cargo-deny configuration per D0018 §8.4 + D0019 license allowlist.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Triaged + accepted advisories (2026-06-01). Full triage in
# docs/decisions/D0026 §12 (audit revision note). Each fix is blocked on a
# deliberate coordination event (MSRV / exact-pin bump) or is N/A / dev-only.
ignore = [
    # RUSTSEC-2026-0009 (time DoS) RESOLVED 2026-06-01: time 0.3.44 -> 0.3.47
    # (the patched line) landed with the 1.88 MSRV event (D0018 §7.4) + the
    # paired serde 1.0.220 pin bump (§9.1) that time 0.3.47's serde_core floor
    # required. No longer ignored; the audit/deny gates now enforce it.
    { id = "RUSTSEC-2024-0421", reason = "idna Punycode. Via url=2.5.2, used only to parse TRUSTED config URLs (Sigsum log URL, Tor bridge manifest), not untrusted domains. Fix (url 2.5.4 -> idna 1.0) drags in the heavy ICU tree; not worth it for this low-impact, trusted-input path." },
    { id = "RUSTSEC-2025-0023", reason = "tokio broadcast clone/Sync. N/A: Cairn uses no tokio::sync::broadcast (verified by grep). Vulnerable API unreachable; the tokio=1.40.0 pin is deliberate (D0018 §9.1)." },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained (not a vuln). Transitive via reqwest=0.12.5; fix is a reqwest pin bump (coordination event), deferred." },
    { id = "RUSTSEC-2021-0139", reason = "ansi_term unmaintained. DEV-ONLY: dudect-bencher -> clap 2.x (constant-time benchmark harness); never in shipped artifacts; upstream dudect-bencher pins clap 2.x." },
    { id = "RUSTSEC-2024-0375", reason = "atty unmaintained. DEV-ONLY: dudect-bencher -> clap 2.x; never shipped; upstream-bound." },
    { id = "RUSTSEC-2021-0145", reason = "atty potential unaligned read (Windows-only). DEV-ONLY: dudect-bencher -> clap 2.x; not reachable in CI/release builds." },
]
# vulnerability = "deny" and notice = "warn" are now the cargo-deny defaults
# (since v0.14; explicit settings would emit deprecation warnings)

[licenses]
# Per D0019 license allowlist.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "AGPL-3.0-only",
    # `AGPL-3.0` is the DEPRECATED SPDX spelling of AGPLv3 (ambiguous re:
    # "-only" vs "-or-later"); `simploxide-ffi-core` + `simploxide-sxcrt-sys`
    # (the Android in-process transport subtree, D0026 §12) declare it. Same
    # AGPLv3 family as Cairn's own `AGPL-3.0-only` (D0019), so allowed. These
    # crates only enter the graph under `cfg(target_os = "android")`.
    "AGPL-3.0",
    # Apache-2.0 WITH LLVM-exception is permissive enough to allow
    "Apache-2.0 WITH LLVM-exception",
    # CDLA-Permissive-2.0 is the Community Data License Agreement (permissive),
    # used by `webpki-roots` for the bundled Mozilla CA root set — permissive
    # data, not code; safe to consume as a dependency.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"  # tighten to "deny" after initial cleanup
wildcards = "deny"
# Cairn's intra-workspace deps are referenced as `{ path = ... }` with no
# version field; cargo-deny treats those as wildcards. Permit them while still
# denying genuine `version = "*"` requirements on external crates.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
