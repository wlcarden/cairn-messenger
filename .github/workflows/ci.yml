# CI workflow per D0018 §8.5.
#
# Gates by category:
#   - blocking: fmt, clippy, doc, test, cargo-audit, cargo-deny, cargo-machete,
#     discipline-grep, cargo-fuzz (PR; 60s/target)
#   - smoke (non-blocking): dudect-bencher (runs the constant-time harness but
#     does not fail on the t-threshold — threshold gating runs out-of-band per
#     D0018 §5.3)
#
# cargo-geiger was removed: it does not build on the pinned toolchain (1.91) and
# is redundant with the workspace `unsafe_code = "forbid"` lint + cargo-audit/deny.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2
      # Broken intra-doc links + invalid-HTML-tag rustdoc lints (gated so
      # they fail the PR rather than accruing silently; added 2026-05-31).
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@main

  discipline-grep:
    name: discipline grep gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret-leak in logs grep gate
        run: |
          if grep -rnE 'debug!.*\?(secret|key_share|private_key|plaintext|seed)' --include='*.rs' crates/; then
            echo "::error::Secret-bearing values logged in debug! macro. See D0018 §4.3 logging discipline."
            exit 1
          fi
          if grep -rnE 'trace!.*\?(secret|key_share|private_key|plaintext|seed)' --include='*.rs' crates/; then
            echo "::error::Secret-bearing values logged in trace! macro. See D0018 §4.3 logging discipline."
            exit 1
          fi
      - name: Raw bytes in error variants grep gate
        run: |
          # Look for thiserror error enums containing Vec<u8> or &[u8] payloads.
          # The pattern is approximate; sophisticated cases require manual review.
          if grep -rnE '#\[error\(.*\)\]\s*\w+\(Vec<u8>\)' --include='*.rs' crates/; then
            echo "::error::Raw byte payload in error variant. See D0018 §4.2 error-handling discipline."
            exit 1
          fi
      - name: dbg! macro grep gate
        run: |
          if grep -rn 'dbg!' --include='*.rs' crates/; then
            echo "::error::dbg! macro committed. See D0018 §4.3 logging discipline (clippy::dbg_macro)."
            exit 1
          fi
      - name: NeverExport FFI-boundary gate
        # D0020 §3.7 / D0027 §4: no secret-carrier type may be a uniffi::Record
        # field. The assert_exportable allow-list is a review checkpoint (stable
        # Rust can't express a negative impl); this scan is the executable guard.
        run: python3 scripts/check-ffi-no-secrets.py

  # Android cross-compile placeholder — wired in once cargo-ndk is configured.
  # auditable-release:
  #   name: cargo auditable release builds
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@1.91.0
  #     - run: cargo install cargo-auditable cargo-ndk
  #     - run: cargo ndk -t arm64-v8a -t x86_64 -p 24 build --release

  # Fuzz harness PR-time runs per D0018 §8.5. Each target runs for
  # 60 seconds of libFuzzer iterations on the PR's HEAD; failures
  # (panic / sanitizer crash / timeout) write a crash artifact to
  # fuzz/artifacts/<target>/ which CI uploads as a job artifact for
  # post-mortem. Continuous runs (per D0018 §5.2's OSS-Fuzz
  # integration) land separately once the repo is public per D0019.
  fuzz-pr:
    if: github.event_name == 'pull_request'
    name: cargo-fuzz (PR; 60s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - run: cargo install cargo-fuzz
      - run: |
          set -euo pipefail
          cd fuzz
          for target in fuzz_envelope_parse fuzz_canonical_cbor \
                        fuzz_shamir_reconstruct fuzz_capability_token \
                        fuzz_trust_graph_op fuzz_master_attestation \
                        fuzz_release_bundle; do
            echo "::group::$target"
            cargo +nightly fuzz run "$target" -- -max_total_time=60
            echo "::endgroup::"
          done
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

  # dudect-bencher smoke test: builds the cairn-ct-bench harness in
  # release mode (per D0018 §5.3 — release-profile timing tests
  # because `subtle`'s historical `opt-level` regressions reintroduced
  # variable time at lower opt levels) and runs the default one-shot
  # iteration count (10_000 per harness's N_INPUTS). This verifies the
  # harness compiles + runs without panic + produces well-formed
  # t-statistic output. The harness does NOT currently fail the build
  # on t > 4.5 because CI hosted runners are too noisy for reliable
  # threshold gating; production validation runs (per D0018 §5.3 line
  # 460's 10⁶ recommendation) should use `--continuous` on dedicated
  # hardware. Strict t < 4.5 gating in CI is a follow-up surface that
  # requires either a wrapper script parsing dudect output or
  # dudect-bencher API support for programmatic threshold checks.
  dudect-bencher:
    name: dudect-bencher smoke test (release profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --package cairn-ct-bench
      - run: ./target/release/cairn-ct-bench
